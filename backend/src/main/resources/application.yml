spring:
  application:
    name: creditscope-backend
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/creditscope}
    username: ${DATABASE_USERNAME:creditscope}
    password: ${DATABASE_PASSWORD:creditscope}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

server:
  port: ${PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:dev-only-secret-do-not-use-in-production-min-32-bytes-long}
    expiration-ms: 3600000
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

springdoc:
  swagger-ui:
    path: /swagger-ui.html
