# @spec DEPLOY-013
# Render "Blueprint" spec — https://render.com/docs/blueprint-spec
# In the Render dashboard: New > Blueprint > select this repo, and it reads this file.
services:
  - type: web
    name: creditscope-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_USERNAME
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        sync: false
