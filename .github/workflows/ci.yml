# @spec DEPLOY-008, DEPLOY-009, DEPLOY-010, DEPLOY-011
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Run backend tests (JUnit + MockMvc/Testcontainers integration)
        working-directory: backend
        run: mvn -B test

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Run frontend unit/hook tests
        working-directory: frontend
        run: npm test
      - name: Type-check and build
        working-directory: frontend
        run: npm run build
