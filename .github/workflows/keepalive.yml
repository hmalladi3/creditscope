# Pings the live Render backend often enough that it never hits Render's ~15min
# idle timeout, so the public demo link loads instantly instead of cold-starting.
# The cold-start handling itself (FE-UI-016: the "waking up" banner, retry logic)
# stays in the app regardless — this just means a visitor is unlikely to ever see
# it fire, and the app degrades gracefully instead of looking broken on the rare
# occasion this workflow itself doesn't run in time (GitHub's schedule trigger is
# best-effort, not guaranteed to the minute).
name: Keep backend warm

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 6 # 3 attempts × 100s curl timeout each, plus overhead
    steps:
      - name: Ping backend health endpoint
        run: |
          # A single attempt with a short timeout can false-alarm on a genuine
          # cold start (observed directly: the very first run after a period of
          # no traffic caught the backend still asleep and curl gave up before
          # the container finished waking). Retrying with a generous per-attempt
          # timeout distinguishes "was cold, now warmed up" from "actually down."
          for attempt in 1 2 3; do
            status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 100 https://creditscope-backend.onrender.com/actuator/health || echo "000")
            echo "Attempt $attempt: status $status"
            if [ "$status" = "200" ]; then
              exit 0
            fi
          done
          echo "::error::Backend health check failed after 3 attempts (last status: $status)"
          exit 1
