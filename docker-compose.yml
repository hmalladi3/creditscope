# @spec DEPLOY-001, DEPLOY-002
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: creditscope
      POSTGRES_USER: creditscope
      POSTGRES_PASSWORD: creditscope
    ports:
      - "5432:5432"
    volumes:
      - creditscope-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U creditscope"]
      interval: 3s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: jdbc:postgresql://db:5432/creditscope
      DATABASE_USERNAME: creditscope
      DATABASE_PASSWORD: creditscope
      JWT_SECRET: ${JWT_SECRET:-dev-only-secret-do-not-use-in-production-min-32-bytes-long}
      CORS_ALLOWED_ORIGINS: http://localhost:5173
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8080
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  creditscope-db-data:
